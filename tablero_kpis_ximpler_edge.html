<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ximpler EDGE · Tablero KPI</title>
  <style>
    :root{--bg:#f4f7f9;--card:#fff;--text:#1f2937;--muted:#667085;--line:#e4e7ec;--line2:#d0d5dd;--green:#126b5a;--green2:#22a652;--greenSoft:#e8f7ee;--blue:#0f5ea9;--blueSoft:#eef5ff;--red:#d92d20;--redSoft:#fef3f2;--yellow:#b7791f;--yellowSoft:#fffaeb;--shadow:0 14px 35px rgba(15,23,42,.08);--radius:16px}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}.page{max-width:1480px;margin:0 auto;padding:26px}.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:18px}h1{margin:0;font-size:32px}.subtitle{margin:7px 0 0;color:var(--muted);font-size:14px}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border-radius:11px;font-weight:800;cursor:pointer;font-size:13px;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 14px;border:1px solid transparent;background:#fff;color:var(--text)}.btn-primary{background:var(--green);color:#fff;box-shadow:var(--shadow)}.btn-secondary{border-color:var(--line2)}.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.summary{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:16px}.sum{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:var(--shadow)}.sum-l{font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:900;margin-bottom:6px}.sum-v{font-size:23px;font-weight:900}.sum-n{font-size:12px;color:var(--muted);margin-top:4px}.filters{display:grid;grid-template-columns:1fr 220px 220px 220px;gap:12px;padding:16px;border-bottom:1px solid var(--line)}.input,.select{width:100%;border:1px solid var(--line2);border-radius:11px;padding:11px;background:#fff;color:var(--text);font-size:14px}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:1540px}th,td{padding:12px 10px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}th{background:#fbfcfd;color:#667085;text-align:left;font-size:11px;text-transform:uppercase;font-weight:900}.badge{display:inline-flex;align-items:center;padding:6px 9px;border-radius:999px;font-size:11px;font-weight:900;white-space:nowrap}.b-green{background:var(--greenSoft);color:var(--green2)}.b-red{background:var(--redSoft);color:var(--red)}.b-yellow{background:var(--yellowSoft);color:var(--yellow)}.b-blue{background:var(--blueSoft);color:var(--blue)}.b-gray{background:#f2f4f7;color:#667085}.gauge{width:76px;height:42px;position:relative;overflow:hidden}.gauge:before{content:"";position:absolute;left:0;top:0;width:76px;height:76px;border-radius:50%;background:conic-gradient(from 270deg,var(--red) 0 54deg,var(--yellow) 54deg 108deg,var(--green2) 108deg 180deg,#e9eef3 180deg 360deg)}.gauge:after{content:"";position:absolute;left:14px;top:14px;width:48px;height:48px;border-radius:50%;background:#fff}.needle{position:absolute;left:37px;bottom:3px;width:3px;height:31px;background:#172033;border-radius:999px;transform-origin:bottom center;transform:rotate(calc(-90deg + (var(--score)*1.8deg)));z-index:2}.score-text{position:absolute;left:0;right:0;bottom:-1px;text-align:center;font-size:10px;font-weight:900;z-index:3}.pill{display:inline-flex;min-width:54px;justify-content:center;border-radius:999px;padding:7px 10px;font-weight:900}.green{background:var(--greenSoft);color:var(--green2)}.yellow{background:var(--yellowSoft);color:var(--yellow)}.red{background:var(--redSoft);color:var(--red)}.weight{width:76px;border:1px solid var(--line2);border-radius:9px;padding:7px 8px;font-weight:900}.muted{color:var(--muted)}@media(max-width:1000px){.summary,.filters{grid-template-columns:1fr}.topbar{flex-direction:column}.page{padding:16px}}
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar"><div><h1>Tablero KPI´s · Ximpler EDGE</h1><p id="subtitle" class="subtitle">Vista ejecutiva de indicadores, pesos, metas, avance, impacto y riesgo.</p></div><div class="actions"><button id="backBtn" class="btn btn-secondary">← Volver</button><button id="refreshBtn" class="btn btn-primary">Actualizar</button><button id="exportBtn" class="btn btn-secondary">Exportar CSV</button></div></div>
    <div id="summary" class="summary"></div>
    <div class="card"><div class="filters"><input id="search" class="input" placeholder="Buscar objetivo, indicador, responsable, área"><select id="typeFilter" class="select"><option value="all">Todos los tipos</option><option value="vision">Visión / Resultado superior</option><option value="resultado">Resultado</option><option value="cliente">Cliente / Población</option><option value="impulsor">Impulsor / Operación</option><option value="habilitador">Habilitador / Capacidades</option></select><select id="stateFilter" class="select"><option value="all">Todos los estados</option><option value="green">En meta</option><option value="yellow">Atención</option><option value="red">Crítico</option></select><select id="perspectiveFilter" class="select"><option value="all">Todas las perspectivas</option><option value="financiera">Financiera / Resultado</option><option value="cliente">Cliente / Mercado</option><option value="procesos">Procesos</option><option value="capacidades">Capacidades</option></select></div><div class="table-wrap"><table id="kpiTable"><thead><tr><th>Medidor objetivo</th><th>Objetivo</th><th>Tipo</th><th>Perspectiva</th><th>Peso objetivo</th><th>Indicador</th><th>Peso indicador</th><th>Subárea / Dueño</th><th>Valor actual</th><th>Meta</th><th>Fecha compromiso</th><th>Avance</th><th>Impacto Obj.</th><th>Riesgo Obj.</th><th>Estado</th></tr></thead><tbody id="body"></tbody></table></div></div>
  </div>
  <script>
    const OBJECTIVES_KEY='ximpler_objetivos_demo_v7_planes', PLANNINGS_KEY='ximpler_planeaciones_demo_v1';
    const typeLabels={vision:'Visión',resultado:'Resultado',cliente:'Cliente',impulsor:'Impulsor',habilitador:'Habilitador'};
    const $=id=>document.getElementById(id); const esc=v=>{const d=document.createElement('div');d.textContent=String(v??'');return d.innerHTML}; const clamp=n=>Math.max(0,Math.min(100,Number(n||0))); const load=k=>{try{return JSON.parse(localStorage.getItem(k)||'[]')}catch(e){return[]}}; const save=(objs)=>localStorage.setItem(OBJECTIVES_KEY,JSON.stringify(objs));
    const params=new URLSearchParams(location.search); let planningId=params.get('planningId')||localStorage.getItem('ximpler_current_planning_id')||''; let plannings=[],objectives=[];
    function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
    function fmtDate(s){if(!s)return'—';const d=new Date(s+'T00:00:00');return new Intl.DateTimeFormat('es-MX',{day:'2-digit',month:'short',year:'numeric'}).format(d)}
    function daysText(s){if(!s)return'—';const t=new Date(s+'T00:00:00');t.setHours(0,0,0,0);const n=new Date();n.setHours(0,0,0,0);const diff=Math.round((t-n)/86400000);if(diff>0)return'En '+diff+' día'+(diff!==1?'s':'');if(diff===0)return'Hoy';return'Hace '+Math.abs(diff)+' día'+(diff!==-1?'s':'')}
    function normInd(i={}){return{id:i.id||Math.random(),name:i.name||'',action:i.action||'Incrementar',unit:i.unit||'',initialValue:Number(i.initialValue??i.initial??0),current:Number(i.current||0),target:Number(i.target||0),owner:i.owner||'',kpiWeight:Number(i.kpiWeight||100),hidden:!!i.hidden}}
    function normInit(i={}){return{name:i.name||'',progress:Number(i.progress||0),expectedImpact:Number(i.expectedImpact||0),realImpact:Number(i.realImpact||0)}}
    function normObj(o={}){const inits=(o.initiatives||o.activities||[]).map(normInit);return{...o,id:o.id||'',planningId:o.planningId||'',name:o.name||'',code:o.code||'',leader:o.leader||'',areas:Array.isArray(o.areas)?o.areas:[],endDate:o.endDate||'',objectiveType:o.objectiveType||'resultado',strategicPerspective:o.strategicPerspective||'financiera',kpiWeight:Number(o.kpiWeight||0),budgetAlignment:o.budgetAlignment||'Medio',processAlignment:o.processAlignment||'Medio',structureAlignment:o.structureAlignment||'Medio',indicatorAlignment:o.indicatorAlignment||'Medio',gapRisk:o.gapRisk||'Medio',indicators:Array.isArray(o.indicators)?o.indicators.map(normInd):[],initiatives:inits}}
    function calcInd(i){const a=String(i.action||'Incrementar').toLowerCase(),initial=Number(i.initialValue||0),target=Number(i.target||0),current=Number(i.current||0);let s=0;if(a==='reducir'){const need=initial-target;s=need<=0?(current<=target?100:0):((initial-current)/need)*100}else if(a==='mantener'){const base=Math.abs(initial)||Math.abs(target)||1;s=current===target?100:100-(Math.abs(current-target)/base)*100}else{const need=target-initial;s=need<=0?(current>=target?100:0):((current-initial)/need)*100}return Math.round(clamp(s))}
    function objKpi(o){const inds=(o.indicators||[]).filter(i=>!i.hidden);if(!inds.length)return 0;const tw=inds.reduce((a,i)=>a+Number(i.kpiWeight||1),0)||inds.length;return Math.round(inds.reduce((a,i)=>a+calcInd(i)*Number(i.kpiWeight||1),0)/tw)}
    function objImpact(o){const arr=o.initiatives||[];if(!arr.length)return 0;const vals=arr.map(i=>i.expectedImpact>0?clamp(i.realImpact/i.expectedImpact*100):clamp(i.progress));return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length)}
    function riskValue(v){return({Bajo:20,Medio:45,Alto:75,'Crítico':95,Critico:95})[v]??45} function objRisk(o){let r=riskValue(o.gapRisk);if(objKpi(o)<50)r+=15;if(o.endDate&&new Date(o.endDate+'T00:00:00')<new Date(todayKey()+'T00:00:00'))r+=15;return clamp(r)}
    function state(score){if(score>=80)return{key:'green',label:'En meta'};if(score>=50)return{key:'yellow',label:'Atención'};return{key:'red',label:'Crítico'}} function cls(s){return s>=80?'green':s>=50?'yellow':'red'} function gauge(v){v=clamp(v);return'<div class="gauge" style="--score:'+v+'"><div class="needle"></div><div class="score-text">'+v+'%</div></div>'} function pill(v){return'<span class="pill '+cls(v)+'">'+v+'%</span>'} function badge(t,c){return'<span class="badge b-'+(c||'blue')+'">'+esc(t)+'</span>'}
    function loadData(){plannings=load(PLANNINGS_KEY);objectives=load(OBJECTIVES_KEY).map(normObj);if(!planningId&&plannings.length)planningId=plannings[0].id;localStorage.setItem('ximpler_current_planning_id',planningId)}
    function visible(){return objectives.filter(o=>!planningId||o.planningId===planningId)} function avg(arr,fn){return arr.length?Math.round(arr.reduce((a,x)=>a+fn(x),0)/arr.length):0}
    function render(loadAgain=true){if(loadAgain)loadData();const plan=plannings.find(p=>p.id===planningId)||{};const objs=visible();const kpi=avg(objs,objKpi),impact=avg(objs,objImpact),risk=avg(objs,objRisk);const inds=objs.flatMap(o=>(o.indicators||[]).filter(i=>!i.hidden));const igee=Math.round(kpi*.45+impact*.30+(100-risk)*.25);$('subtitle').textContent=(plan.name||'Planeación')+' · '+(plan.vision||plan.description||'Vista ejecutiva de KPIs');$('summary').innerHTML=[['IGEE',igee+'%','Score ejecutivo'],['Objetivos',objs.length,'Dentro del plan'],['Indicadores',inds.length,'Activos visibles'],['Avance KPI',kpi+'%','Resultado cuantitativo'],['Impacto',impact+'%','Real vs esperado'],['Riesgo',risk+'%','Riesgo promedio']].map(x=>'<div class="sum"><div class="sum-l">'+x[0]+'</div><div class="sum-v">'+x[1]+'</div><div class="sum-n">'+x[2]+'</div></div>').join('');const q=$('search').value.toLowerCase(),tf=$('typeFilter').value,sf=$('stateFilter').value,pf=$('perspectiveFilter').value;const rows=[];objs.forEach(o=>{const inds=(o.indicators||[]).filter(i=>!i.hidden);inds.forEach((ind,idx)=>{const score=calcInd(ind),st=state(score),hay=[o.name,o.code,o.leader,...o.areas,ind.name,ind.owner,ind.unit].join(' ').toLowerCase();if(q&&!hay.includes(q))return;if(tf!=='all'&&o.objectiveType!==tf)return;if(sf!=='all'&&st.key!==sf)return;if(pf!=='all'&&o.strategicPerspective!==pf)return;rows.push({o,ind,idx,score,st})})});$('body').innerHTML=rows.map(r=>'<tr>'+(r.idx===0?'<td rowspan="'+(r.o.indicators||[]).filter(i=>!i.hidden).length+'">'+gauge(objKpi(r.o))+'</td><td rowspan="'+(r.o.indicators||[]).filter(i=>!i.hidden).length+'"><strong>'+esc(r.o.code?r.o.code+' · ':'')+esc(r.o.name)+'</strong><div class="muted">'+esc(r.o.leader||'—')+'</div></td><td rowspan="'+(r.o.indicators||[]).filter(i=>!i.hidden).length+'">'+badge(typeLabels[r.o.objectiveType]||r.o.objectiveType,'blue')+'</td><td rowspan="'+(r.o.indicators||[]).filter(i=>!i.hidden).length+'">'+esc(r.o.strategicPerspective)+'</td><td rowspan="'+(r.o.indicators||[]).filter(i=>!i.hidden).length+'"><input class="weight" type="number" value="'+esc(r.o.kpiWeight||'')+'" data-ow="'+r.o.id+'"> %</td>':'')+'<td><strong>'+esc(r.ind.name)+'</strong><div class="muted">'+esc(r.ind.action)+'</div></td><td><input class="weight" type="number" value="'+esc(r.ind.kpiWeight||100)+'" data-iw="'+r.o.id+'" data-idx="'+r.idx+'"> %</td><td>'+esc(r.ind.owner||r.o.areas.join(', ')||r.o.leader||'—')+'</td><td>'+esc(r.ind.current)+' '+esc(r.ind.unit||'')+'</td><td>'+esc(r.ind.target)+' '+esc(r.ind.unit||'')+'</td><td>'+daysText(r.o.endDate)+'</td><td>'+pill(r.score)+'</td><td>'+pill(objImpact(r.o))+'</td><td>'+pill(objRisk(r.o))+'</td><td>'+badge(r.st.label,r.st.key==='green'?'green':r.st.key==='yellow'?'yellow':'red')+'</td></tr>').join('')||'<tr><td colspan="15" class="muted">No hay KPI´s.</td></tr>';document.querySelectorAll('[data-ow]').forEach(i=>i.onchange=()=>{const o=objectives.find(x=>x.id===i.dataset.ow);if(o){o.kpiWeight=Number(i.value||0);save(objectives);render(false)}});document.querySelectorAll('[data-iw]').forEach(i=>i.onchange=()=>{const o=objectives.find(x=>x.id===i.dataset.iw);if(o&&o.indicators[i.dataset.idx]){o.indicators[i.dataset.idx].kpiWeight=Number(i.value||0);save(objectives);render(false)}})}
    function exportCsv(){const rows=[...document.querySelectorAll('#kpiTable tr')].map(tr=>[...tr.children].map(td=>'"'+td.innerText.replace(/"/g,'""')+'"').join(',')).join('\n');const blob=new Blob(['\ufeff'+rows],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='tablero_kpis_ximpler_edge.csv';a.click();URL.revokeObjectURL(a.href)}
    ['search','typeFilter','stateFilter','perspectiveFilter'].forEach(id=>$(id).addEventListener('input',()=>render(false)));$('refreshBtn').onclick=()=>render(true);$('exportBtn').onclick=exportCsv;$('backBtn').onclick=()=>history.length>1?history.back():location.href='index_ximpler_edge_copiloto.html';render(true);
  </script>
</body>
</html>
