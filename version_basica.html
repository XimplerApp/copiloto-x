<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ximpler EDGE · Versión Básica</title>
  <style>
    :root{
      --bg:#f4f7f9;--card:#fff;--text:#1f2937;--muted:#667085;--line:#e4e7ec;--line2:#d0d5dd;
      --green:#126b5a;--green2:#22a652;--greenSoft:#e8f7ee;--blue:#0f5ea9;--blueSoft:#eef5ff;
      --red:#d92d20;--redSoft:#fef3f2;--yellow:#b7791f;--yellowSoft:#fffaeb;--graySoft:#f2f4f7;
      --purple:#6941c6;--purpleSoft:#f4f3ff;--shadow:0 14px 35px rgba(15,23,42,.08);--radius:16px;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}
    button,input,select{font-family:inherit}
    .page{max-width:1480px;margin:0 auto;padding:26px}
    .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:18px}
    h1{margin:0;font-size:34px;line-height:1.05}.subtitle{margin:7px 0 0;color:var(--muted);font-size:14px;line-height:1.45}
    .actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .btn{border-radius:11px;font-weight:800;cursor:pointer;font-size:13px;transition:.15s ease;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 14px;border:1px solid transparent;background:#fff;color:var(--text)}
    .btn:hover{transform:translateY(-1px)}.btn-primary{background:var(--green);color:#fff;box-shadow:var(--shadow)}.btn-secondary{border-color:var(--line2)}.btn-danger{border-color:#fecdca;background:#fff;color:var(--red)}.btn-small{padding:7px 9px;font-size:12px}.hidden{display:none!important}
    .summary-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:16px}.summary-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px 15px;box-shadow:var(--shadow)}.summary-label{font-size:11px;color:var(--muted);font-weight:900;text-transform:uppercase;margin-bottom:6px}.summary-value{font-size:24px;font-weight:900}.summary-note{font-size:12px;color:var(--muted);margin-top:4px}
    .nav-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:15px}.tab{border:1px solid var(--line2);background:#fff;border-radius:999px;padding:9px 12px;font-size:13px;font-weight:900;cursor:pointer;color:#344054}.tab.active{background:var(--green);color:#fff;border-color:var(--green)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.card-pad{padding:18px}.filters{display:grid;grid-template-columns:1fr 220px 220px;gap:12px;padding:16px;border-bottom:1px solid var(--line)}
    .input,.select{width:100%;border:1px solid var(--line2);border-radius:11px;padding:11px 12px;background:#fff;color:var(--text);font-size:14px;outline:none}.input:focus,.select:focus,.weight-input:focus{border-color:#84c5ff;box-shadow:0 0 0 3px rgba(15,94,169,.12)}
    .table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:1120px}th,td{padding:12px 10px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:top}th{background:#fbfcfd;color:#667085;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.02em;font-weight:900}tbody tr:hover{background:#fcfdfd}
    .objective-cell{display:flex;align-items:flex-start;gap:10px}.toggle-obj{width:20px;height:20px;border:none;background:transparent;color:#667085;cursor:pointer;font-size:15px;font-weight:900;display:inline-grid;place-items:center;padding:0;line-height:1;margin-top:1px}.obj-title{font-weight:900;color:var(--green);cursor:pointer}.muted{color:var(--muted)}.small{font-size:12px}.mono{font-variant-numeric:tabular-nums}
    .progress{height:9px;border-radius:999px;background:#edf1f5;overflow:hidden;width:120px}.fill{height:100%;border-radius:999px}.ring{--val:0;--color:var(--green2);width:54px;height:54px;border-radius:50%;display:grid;place-items:center;position:relative;background:conic-gradient(var(--color) calc(var(--val)*1%),#edf1f5 0);font-weight:900;font-size:12px}.ring::after{content:"";position:absolute;width:40px;height:40px;border-radius:50%;background:#fff}.ring span{position:relative;z-index:1}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 9px;border-radius:999px;font-size:11px;font-weight:900;white-space:nowrap}.b-green{background:var(--greenSoft);color:var(--green2)}.b-red{background:var(--redSoft);color:var(--red)}.b-yellow{background:var(--yellowSoft);color:var(--yellow)}.b-blue{background:var(--blueSoft);color:var(--blue)}.b-purple{background:var(--purpleSoft);color:var(--purple)}.b-gray{background:var(--graySoft);color:#667085}
    .cascade-row td{background:#fbfcfd;padding:0}.cascade-cell{padding:0!important}.objective-cascade{padding:14px 18px 18px;background:#fbfcfd}.objective-cascade-header{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px;padding:10px 14px;border:1px solid var(--line);border-bottom:none;border-radius:16px 16px 0 0;background:#fff;font-weight:900}.initiative-cascade-list{border:1px solid var(--line);border-radius:0 0 16px 16px;background:#fff;overflow:hidden}.initiative-cascade-card{display:grid;grid-template-columns:minmax(220px,2fr) minmax(160px,1fr) minmax(140px,1fr) minmax(180px,1fr) minmax(190px,1.2fr);gap:16px;align-items:center;padding:14px;border-top:1px solid var(--line)}.initiative-cascade-card:first-child{border-top:none}.subline{margin-top:4px;color:var(--muted);font-size:12px;line-height:1.4}.empty-box{border:1px dashed var(--line2);border-radius:16px;padding:18px;background:#fff;color:var(--muted)}
    .group-cell{background:#fff;vertical-align:top}.group-box{border:1px solid var(--line2);border-radius:12px;padding:12px 13px;background:#fff;box-shadow:0 6px 14px rgba(15,23,42,.04);min-width:210px}.group-box.objective-box{border-left:4px solid var(--green)}.group-box.initiative-box{border-left:4px solid var(--blue)}.group-kicker{font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:900;margin-bottom:5px}.group-sub{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.35}.action-title{font-weight:900;color:var(--text);margin-bottom:5px}.action-detail{color:var(--muted);font-size:12px;line-height:1.4;max-width:360px}
    .weight-input{width:78px;border:1px solid var(--line2);border-radius:9px;padding:8px 9px;font-size:13px;font-weight:900;color:#111827;background:#fff}.weight-wrap{display:flex;align-items:center;gap:5px}.advance-pill{display:inline-flex;align-items:center;justify-content:center;min-width:54px;padding:7px 10px;border-radius:999px;font-weight:900}.advance-green{background:var(--greenSoft);color:var(--green2)}.advance-yellow{background:var(--yellowSoft);color:#a67c00}.advance-red{background:var(--redSoft);color:var(--red)}
    .empty{padding:24px;text-align:center;color:var(--muted)}
    @media(max-width:1100px){.summary-grid,.filters{grid-template-columns:1fr}.topbar{flex-direction:column}.page{padding:16px}.initiative-cascade-card{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <a id="backToIndex" class="btn btn-secondary btn-small" href="index.html">← Volver a versión completa</a>
        <h1 id="pageTitle" style="margin-top:10px">Versión Básica</h1>
        <p id="pageSubtitle" class="subtitle">Vista simple combinada: objetivos, KPI´s y tablero operativo.</p>
      </div>
      <div class="actions">
        <button id="refreshBtn" class="btn btn-secondary" type="button">Actualizar datos</button>
        <button id="exportBtn" class="btn btn-primary" type="button">Exportar CSV</button>
      </div>
    </div>

    <div id="summaryGrid" class="summary-grid"></div>

    <div class="nav-tabs">
      <button class="tab active" data-tab="objetivos">Objetivos</button>
      <button class="tab" data-tab="kpis">Tablero KPI´s</button>
      <button class="tab" data-tab="operativo">Tablero Operativo</button>
    </div>

    <section id="tabObjetivos" class="view-panel"></section>
    <section id="tabKpis" class="view-panel hidden"></section>
    <section id="tabOperativo" class="view-panel hidden"></section>
  </div>

  <script>
    const OBJECTIVES_KEY='ximpler_objetivos_demo_v7_planes';
    const PLANNINGS_KEY='ximpler_planeaciones_demo_v1';
    const LEGACY_KEYS=['ximpler_objetivos_demo_v7_planes','ximpler_objetivos_demo_v6_3','ximpler_objetivos_demo_v6_1','ximpler_objetivos_demo_v6','ximpler_objetivos_demo_v5','ximpler_objetivos_demo_v4','ximpler_objetivos_demo_v3','ximpler_objetivos_demo_v1'];
    const params=new URLSearchParams(window.location.search);
    let currentPlanningId=params.get('planningId')||localStorage.getItem('ximpler_current_planning_id')||'';
    let activeTab='objetivos';
    let expanded={};
    let rawObjectives=[];
    let objectives=[];
    let plannings=[];

    const $=id=>document.getElementById(id);
    const esc=v=>{const d=document.createElement('div');d.textContent=String(v??'');return d.innerHTML};
    const clamp=n=>Math.max(0,Math.min(100,Number(n||0)));
    function loadJson(key,fallback=[]){try{return JSON.parse(localStorage.getItem(key)||JSON.stringify(fallback))}catch(e){return fallback}}
    function loadRawObjectives(){for(const key of LEGACY_KEYS){const saved=localStorage.getItem(key);if(!saved)continue;try{const parsed=JSON.parse(saved);if(Array.isArray(parsed))return parsed}catch(e){}}return[]}
    function saveRawObjectives(){localStorage.setItem(OBJECTIVES_KEY,JSON.stringify(rawObjectives));objectives=rawObjectives.map(normalizeObjective)}
    function fmtDate(s){if(!s)return'—';const d=new Date(s+'T00:00:00');return new Intl.DateTimeFormat('es-MX',{day:'2-digit',month:'short',year:'numeric'}).format(d)}
    function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
    function daysText(s){if(!s)return'—';const t=new Date(s+'T00:00:00');t.setHours(0,0,0,0);const n=new Date();n.setHours(0,0,0,0);const diff=Math.round((t-n)/86400000);if(diff>0)return 'En '+diff+' día'+(diff!==1?'s':'');if(diff===0)return'Hoy';return 'Hace '+Math.abs(diff)+' día'+(diff!==-1?'s':'')}
    function progressColor(v){v=Number(v||0);return v>=80?'var(--green2)':v>=50?'var(--yellow)':'var(--red)'}
    function ring(v){v=clamp(v);return '<div class="ring" style="--val:'+v+';--color:'+progressColor(v)+'"><span>'+v+'%</span></div>'}
    function statusKey(s){return String(s||'activo').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_')}
    function statusLabel(s){const k=statusKey(s);return ({activo:'Activo',en_riesgo:'En riesgo',pausado:'Pausado',cumplido:'Cumplido',pendiente:'Pendiente',en_progreso:'En progreso',terminada:'Terminada',por_hacer:'Por hacer'})[k]||s||'Activo'}
    function statusBadge(s){const k=statusKey(s);const cls=k.includes('riesgo')?'b-yellow':k.includes('cumpl')||k.includes('termin')?'b-green':k.includes('paus')?'b-gray':k.includes('venc')?'b-red':'b-blue';return '<span class="badge '+cls+'">'+esc(statusLabel(s))+'</span>'}
    function normalizeAction(a={}){return{id:a.id||'',title:a.title||a.name||'',responsible:a.responsible||a.owner||'',dueDate:a.dueDate||a.date||'',detail:a.detail||a.description||'',status:a.status||'Por hacer'}}
    function normalizeInitiative(i={}){return{id:i.id||'',name:i.name||'',owner:i.owner||'',dueDate:i.dueDate||i.date||'',status:i.status||'Pendiente',progress:Number(i.progress||0),actions:Array.isArray(i.actions)?i.actions.map(normalizeAction):[]}}
    function normalizeIndicator(ind={}){return{id:ind.id||'',name:ind.name||'',action:ind.action||'Incrementar',unit:ind.unit||'',initialValue:Number(ind.initialValue??ind.initial??0),target:Number(ind.target??0),current:Number(ind.current??0),frequency:ind.frequency||'Mensual',owner:ind.owner||'',hidden:Boolean(ind.hidden),metaPlan:Array.isArray(ind.metaPlan)?ind.metaPlan:[],kpiWeight:ind.kpiWeight!==undefined?Number(ind.kpiWeight):undefined,valueHistory:Array.isArray(ind.valueHistory)?ind.valueHistory:[]}}
    function normalizeObjective(o={}){const initiatives=(Array.isArray(o.initiatives)?o.initiatives:(Array.isArray(o.activities)?o.activities:[])).map(normalizeInitiative);return{...o,id:o.id||'',planningId:o.planningId||'',name:o.name||'',description:o.description||'',leader:o.leader||'',areas:Array.isArray(o.areas)?o.areas:[],tags:Array.isArray(o.tags)?o.tags:[],linkedProjects:Array.isArray(o.linkedProjects)?o.linkedProjects:[],relatedObjectives:Array.isArray(o.relatedObjectives)?o.relatedObjectives:[],endDate:o.endDate||'',status:o.status||'activo',objectiveType:o.objectiveType||'resultado',strategicPerspective:o.strategicPerspective||'',contributionLevel:o.contributionLevel||'',expectedStrategicResult:o.expectedStrategicResult||'',kpiWeight:o.kpiWeight!==undefined?Number(o.kpiWeight):undefined,indicators:Array.isArray(o.indicators)?o.indicators.map(normalizeIndicator):[],initiatives,activities:initiatives}}
    function loadData(){plannings=loadJson(PLANNINGS_KEY,[]);rawObjectives=loadRawObjectives();objectives=rawObjectives.map(normalizeObjective);if(!currentPlanningId&&plannings.length)currentPlanningId=plannings[0].id;if(currentPlanningId)localStorage.setItem('ximpler_current_planning_id',currentPlanningId)}
    function plan(){return plannings.find(p=>p.id===currentPlanningId)||{}}
    function planObjectives(){return objectives.filter(o=>!currentPlanningId||o.planningId===currentPlanningId)}
    function rawObjective(id){return rawObjectives.find(o=>o.id===id)}
    function getEffectiveTarget(ind={},referenceDate=new Date()){const base=Number(ind.target??0);const plans=Array.isArray(ind.metaPlan)?ind.metaPlan.filter(x=>x&&x.plannedDate).sort((a,b)=>String(a.plannedDate).localeCompare(String(b.plannedDate))):[];if(!plans.length)return base;const key=todayKey(referenceDate);const app=plans.filter(x=>x.plannedDate<=key);return app.length?Number(app[app.length-1].quantity??base):base}
    function calcIndicator(ind={},allowNegative=false){const action=String(ind.action||'Incrementar').toLowerCase();const initial=Number(ind.initialValue??0),target=Number(getEffectiveTarget(ind)??ind.target??0),current=Number(ind.current??0);const norm=v=>allowNegative?Math.round(Math.min(100,v)):Math.round(Math.max(0,Math.min(100,v)));if(action==='reducir'){const need=initial-target;if(need<=0)return current<=target?100:(allowNegative?-100:0);return norm(((initial-current)/need)*100)}if(action==='mantener'){if(current===target)return 100;const base=Math.abs(initial)||Math.abs(target)||1;return norm((-Math.abs(current-target)/base)*100)}const need=target-initial;if(need<=0)return current>=target?100:(allowNegative?-100:0);return norm(((current-initial)/need)*100)}
    function objectiveKpiScore(o){const inds=(o.indicators||[]).filter(i=>!i.hidden);if(!inds.length)return 0;const totalW=inds.reduce((a,i)=>a+Number(i.kpiWeight||1),0)||inds.length;return Math.round(inds.reduce((a,i)=>a+calcIndicator(i,false)*Number(i.kpiWeight||1),0)/totalW)}
    function isDoneStatus(s){return ['terminada','terminado','completada','completado','cumplida','cumplido'].includes(statusKey(s))}
    function actionAdvance(a){return isDoneStatus(a.status)?100:0}
    function initiativeAdvance(i={}){const actions=Array.isArray(i.actions)?i.actions:[];if(actions.length)return Math.round(actions.reduce((a,x)=>a+actionAdvance(x),0)/actions.length);return clamp(i.progress)}
    function objectiveOperationalScore(o){const arr=o.initiatives||[];if(!arr.length)return 0;return Math.round(arr.reduce((a,i)=>a+initiativeAdvance(i),0)/arr.length)}
    function objectiveAvgImpact(o){return objectiveOperationalScore(o)}
    function isOverdue(dueDate,status){if(!dueDate||isDoneStatus(status))return false;const t=new Date(dueDate+'T00:00:00');t.setHours(0,0,0,0);const n=new Date();n.setHours(0,0,0,0);return t<n}
    function getState(score){if(score>=80)return{key:'green',label:'En meta',cls:'advance-green'};if(score>=50)return{key:'yellow',label:'Atención',cls:'advance-yellow'};return{key:'red',label:'Crítico',cls:'advance-red'}}
    function updateHeader(){const p=plan();$('pageTitle').textContent=(p.name||'Planeación')+' · Versión Básica';$('pageSubtitle').textContent=(p.description||'Vista simple combinada')+' · Periodo: '+fmtDate(p.startDate)+' → '+fmtDate(p.endDate);$('backToIndex').href='index.html?planningId='+encodeURIComponent(currentPlanningId||'')}
    function renderSummary(){const objs=planObjectives();const indicators=objs.flatMap(o=>(o.indicators||[]).filter(i=>!i.hidden));const initiatives=objs.flatMap(o=>o.initiatives||[]);const actions=initiatives.flatMap(i=>i.actions||[]);const avg=fn=>objs.length?Math.round(objs.reduce((a,o)=>a+fn(o),0)/objs.length):0;const kpi=avg(objectiveKpiScore),op=avg(objectiveOperationalScore);$('summaryGrid').innerHTML=[['Objetivos',objs.length,'Dentro de la planeación'],['Indicadores',indicators.length,'KPIs activos visibles'],['Iniciativas',initiatives.length,'Ejecución asociada'],['Acciones',actions.length,'Tácticas registradas'],['Avance KPI',kpi+'%','Promedio de indicadores'],['Avance Operativo',op+'%','Promedio de iniciativas']].map(x=>'<div class="summary-card"><div class="summary-label">'+x[0]+'</div><div class="summary-value">'+x[1]+'</div><div class="summary-note">'+x[2]+'</div></div>').join('')}
    function setTab(tab){activeTab=tab;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));$('tabObjetivos').classList.toggle('hidden',tab!=='objetivos');$('tabKpis').classList.toggle('hidden',tab!=='kpis');$('tabOperativo').classList.toggle('hidden',tab!=='operativo');renderActiveTab()}
    function renderActiveTab(){renderSummary();if(activeTab==='objetivos')renderObjetivos();if(activeTab==='kpis')renderKpis();if(activeTab==='operativo')renderOperativo()}
    function renderObjetivos(){const objs=planObjectives();$('tabObjetivos').innerHTML='<div class="card"><div class="filters"><input id="objSearch" class="input" placeholder="Buscar objetivo, área, responsable"><select id="objStatus" class="select"><option value="all">Todos los estatus</option><option value="activo">Activo</option><option value="en_riesgo">En riesgo</option><option value="pausado">Pausado</option><option value="cumplido">Cumplido</option></select><select id="objSort" class="select"><option value="default">Orden original</option><option value="kpi">Mayor KPI</option><option value="operativo">Mayor operativo</option><option value="fecha">Fecha compromiso</option></select></div><div class="table-wrap"><table><thead><tr><th>Objetivo</th><th>KPI</th><th>Operativo</th><th>Líder</th><th>Fecha</th><th>Estatus</th><th>Arquitectura</th></tr></thead><tbody id="objBody"></tbody></table></div><div id="objEmpty" class="empty hidden">No hay objetivos que coincidan.</div></div>';const draw=()=>{let rows=[...objs];const q=$('objSearch').value.toLowerCase(),st=$('objStatus').value,sort=$('objSort').value;rows=rows.filter(o=>(st==='all'||statusKey(o.status)===st)&&[o.name,o.description,o.leader,...(o.areas||[]),...(o.tags||[])].join(' ').toLowerCase().includes(q));if(sort==='kpi')rows.sort((a,b)=>objectiveKpiScore(b)-objectiveKpiScore(a));if(sort==='operativo')rows.sort((a,b)=>objectiveOperationalScore(b)-objectiveOperationalScore(a));if(sort==='fecha')rows.sort((a,b)=>String(a.endDate||'9999').localeCompare(String(b.endDate||'9999')));$('objBody').innerHTML=rows.map(o=>objectiveRow(o)).join('');$('objEmpty').classList.toggle('hidden',!!rows.length);document.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=()=>{expanded[b.dataset.toggle]=!expanded[b.dataset.toggle];draw()})};$('objSearch').oninput=draw;$('objStatus').onchange=draw;$('objSort').onchange=draw;draw()}
    function objectiveRow(o){const ex=!!expanded[o.id];const related=(o.relatedObjectives||[]).map(id=>objectives.find(x=>x.id===id)?.name).filter(Boolean);const main='<tr><td><div class="objective-cell"><button class="toggle-obj" data-toggle="'+o.id+'">'+(ex?'▼':'▶')+'</button><div><div class="obj-title" data-toggle="'+o.id+'">'+esc(o.name)+'</div><div class="small muted">'+esc(o.expectedStrategicResult||o.description||'Sin resultado esperado')+'</div><div class="small muted">'+(related.length?'↔ Relacionado con: '+esc(related.join(', ')):'Sin relación registrada')+'</div></div></div></td><td>'+ring(objectiveKpiScore(o))+'</td><td>'+ring(objectiveOperationalScore(o))+'</td><td><strong>'+esc(o.leader||'—')+'</strong></td><td>'+daysText(o.endDate)+'</td><td>'+statusBadge(o.status)+'</td><td><span class="badge b-purple">'+esc(o.objectiveType||'resultado')+'</span><div class="small muted">'+esc([o.strategicPerspective,o.contributionLevel].filter(Boolean).join(' · ')||'—')+'</div></td></tr>';if(!ex)return main;return main+'<tr class="cascade-row"><td colspan="7" class="cascade-cell">'+renderCascade(o)+'</td></tr>'}
    function renderCascade(o){const initiatives=o.initiatives||[];return '<div class="objective-cascade"><div class="objective-cascade-header"><span>Iniciativas del objetivo</span><span class="small muted">'+initiatives.length+' iniciativa(s)</span></div>'+(initiatives.length?'<div class="initiative-cascade-list">'+initiatives.map(i=>'<div class="initiative-cascade-card"><div><strong>'+esc(i.name)+'</strong><div class="subline">Responsable: '+esc(i.owner||'—')+'</div></div><div><strong>Estatus:</strong> '+esc(statusLabel(i.status))+'</div><div><strong>Fecha:</strong> '+fmtDate(i.dueDate)+'</div><div><strong>Avance:</strong> '+initiativeAdvance(i)+'%<div class="progress" style="margin-top:8px"><div class="fill" style="width:'+initiativeAdvance(i)+'%;background:'+progressColor(initiativeAdvance(i))+'"></div></div></div><div><strong>Acciones:</strong> '+(i.actions||[]).length+'<div class="subline">'+(i.actions||[]).slice(0,2).map(a=>esc(a.title)).join('<br>')+'</div></div></div>').join('')+'</div>':'<div class="empty-box">Sin iniciativas registradas.</div>')+'</div>'}
    function renderKpis(){const objs=planObjectives();$('tabKpis').innerHTML='<div class="card"><div class="filters"><input id="kpiSearch" class="input" placeholder="Buscar objetivo, indicador, responsable"><select id="kpiState" class="select"><option value="all">Todos los estados</option><option value="green">En meta</option><option value="yellow">Atención</option><option value="red">Crítico</option></select><select id="kpiObjective" class="select"><option value="all">Todos los objetivos</option>'+objs.map(o=>'<option value="'+esc(o.id)+'">'+esc(o.name)+'</option>').join('')+'</select></div><div class="table-wrap"><table><thead><tr><th>Objetivo</th><th>Peso Obj.</th><th>Indicador</th><th>Peso KPI</th><th>Responsable</th><th>Valor Actual</th><th>Valor Objetivo</th><th>Avance</th><th>Estado</th></tr></thead><tbody id="kpiBody"></tbody></table></div><div id="kpiEmpty" class="empty hidden">No hay KPI´s que coincidan.</div></div>';const draw=()=>{const q=$('kpiSearch').value.toLowerCase(),sf=$('kpiState').value,of=$('kpiObjective').value;const objDefault=objs.length?Math.round(100/objs.length):0;let html='';objs.forEach(o=>{const inds=(o.indicators||[]).filter(i=>!i.hidden);const indDefault=inds.length?Math.round(100/inds.length):0;inds.forEach((ind,idx)=>{const score=calcIndicator(ind,true),st=getState(score);const hay=[o.name,o.leader,...(o.areas||[]),ind.name,ind.owner,ind.unit,ind.action].join(' ').toLowerCase();if(q&&!hay.includes(q))return;if(sf!=='all'&&st.key!==sf)return;if(of!=='all'&&o.id!==of)return;html+='<tr><td><strong>'+esc(o.name)+'</strong><div class="small muted">'+esc(o.leader||'—')+'</div></td><td><div class="weight-wrap"><input class="weight-input" type="number" min="0" max="100" value="'+esc(o.kpiWeight??objDefault)+'" data-obj-weight="'+esc(o.id)+'"><span>%</span></div></td><td><strong>'+esc(ind.name||'—')+'</strong><div class="small muted">'+esc(ind.action)+' · '+esc(ind.frequency)+'</div></td><td><div class="weight-wrap"><input class="weight-input" type="number" min="0" max="100" value="'+esc(ind.kpiWeight??indDefault)+'" data-ind-weight="'+esc(o.id)+'" data-ind-index="'+idx+'"><span>%</span></div></td><td>'+esc(ind.owner||o.leader||'—')+'</td><td>'+esc(ind.current)+' '+esc(ind.unit||'')+'</td><td>'+esc(getEffectiveTarget(ind))+' '+esc(ind.unit||'')+'</td><td><span class="advance-pill '+st.cls+'">'+score+'%</span></td><td><span class="advance-pill '+st.cls+'">'+st.label+'</span></td></tr>'})});$('kpiBody').innerHTML=html;$('kpiEmpty').classList.toggle('hidden',!!html);document.querySelectorAll('[data-obj-weight]').forEach(inp=>inp.onchange=()=>updateObjectiveWeight(inp.dataset.objWeight,inp.value));document.querySelectorAll('[data-ind-weight]').forEach(inp=>inp.onchange=()=>updateIndicatorWeight(inp.dataset.indWeight,Number(inp.dataset.indIndex),inp.value))};$('kpiSearch').oninput=draw;$('kpiState').onchange=draw;$('kpiObjective').onchange=draw;draw()}
    function updateObjectiveWeight(id,value){const raw=rawObjective(id);if(!raw)return;raw.kpiWeight=Number(value||0);saveRawObjectives();renderSummary();renderKpis()}
    function updateIndicatorWeight(id,idx,value){const raw=rawObjective(id);if(!raw||!Array.isArray(raw.indicators)||!raw.indicators[idx])return;raw.indicators[idx].kpiWeight=Number(value||0);saveRawObjectives();renderSummary();renderKpis()}
    function buildActionRows(){const rows=[];planObjectives().forEach(o=>(o.initiatives||[]).forEach(i=>{const actions=Array.isArray(i.actions)?i.actions:[];if(!actions.length){rows.push({objective:o.name,objectiveAdvance:objectiveOperationalScore(o),initiative:i.name,initiativeAdvance:initiativeAdvance(i),actionTitle:'Sin acciones asignadas',actionDetail:'Esta iniciativa todavía no tiene acciones registradas.',responsible:i.owner||o.leader||'—',dueDate:i.dueDate,status:i.status||'Pendiente',hasAction:false});return}actions.forEach(a=>rows.push({objective:o.name,objectiveAdvance:objectiveOperationalScore(o),initiative:i.name,initiativeAdvance:initiativeAdvance(i),actionTitle:a.title||'Sin título',actionDetail:a.detail||'',responsible:a.responsible||i.owner||o.leader||'—',dueDate:a.dueDate,status:isOverdue(a.dueDate,a.status)?'Vencida':(a.status||'Por hacer'),hasAction:true}))}));return rows}
    function renderOperativo(){$('tabOperativo').innerHTML='<div class="card"><div class="filters"><input id="opSearch" class="input" placeholder="Buscar objetivo, iniciativa, acción o responsable"><select id="opStatus" class="select"><option value="all">Todos los estatus</option><option>Por hacer</option><option>En progreso</option><option>Terminada</option><option>Pausada</option><option>Vencida</option></select><select id="opOnly" class="select"><option value="all">Todo</option><option value="with">Solo con acciones</option><option value="without">Sin acciones</option></select></div><div class="table-wrap"><table><thead><tr><th>Objetivo</th><th>Avance Obj.</th><th>Iniciativa</th><th>Avance Inic.</th><th>Acción</th><th>Responsable</th><th>Fecha compromiso</th><th>Estatus</th></tr></thead><tbody id="opBody"></tbody></table></div><div id="opEmpty" class="empty hidden">No hay acciones que coincidan.</div></div>';const draw=()=>{const q=$('opSearch').value.toLowerCase(),st=$('opStatus').value,only=$('opOnly').value;const rows=buildActionRows().filter(r=>{const hay=[r.objective,r.initiative,r.actionTitle,r.actionDetail,r.responsible,r.status].join(' ').toLowerCase();return(!q||hay.includes(q))&&(st==='all'||statusLabel(r.status)===st||r.status===st)&&(only==='all'||(only==='with'&&r.hasAction)||(only==='without'&&!r.hasAction))});$('opBody').innerHTML=rows.map(r=>'<tr><td><strong>'+esc(r.objective)+'</strong></td><td>'+ring(r.objectiveAdvance)+'</td><td><strong>'+esc(r.initiative)+'</strong></td><td>'+ring(r.initiativeAdvance)+'</td><td><div class="action-title">'+esc(r.actionTitle)+'</div><div class="action-detail">'+esc(r.actionDetail)+'</div></td><td>'+esc(r.responsible)+'</td><td>'+daysText(r.dueDate)+'</td><td>'+statusBadge(r.status)+'</td></tr>').join('');$('opEmpty').classList.toggle('hidden',!!rows.length)};$('opSearch').oninput=draw;$('opStatus').onchange=draw;$('opOnly').onchange=draw;draw()}
    function csvEscape(v){return '"'+String(v??'').replace(/"/g,'""')+'"'}
    function exportCsv(){let rows=[];if(activeTab==='objetivos'){rows=[['Objetivo','KPI','Operativo','Líder','Fecha','Estatus'],...planObjectives().map(o=>[o.name,objectiveKpiScore(o)+'%',objectiveOperationalScore(o)+'%',o.leader,fmtDate(o.endDate),statusLabel(o.status)])]}else if(activeTab==='kpis'){rows=[['Objetivo','Indicador','Valor Actual','Valor Objetivo','Avance','Responsable'],...planObjectives().flatMap(o=>(o.indicators||[]).filter(i=>!i.hidden).map(i=>[o.name,i.name,i.current,getEffectiveTarget(i),calcIndicator(i,true)+'%',i.owner||o.leader]))]}else{rows=[['Objetivo','Avance Obj.','Iniciativa','Avance Inic.','Acción','Detalle','Responsable','Fecha','Estatus'],...buildActionRows().map(r=>[r.objective,r.objectiveAdvance+'%',r.initiative,r.initiativeAdvance+'%',r.actionTitle,r.actionDetail,r.responsible,fmtDate(r.dueDate),statusLabel(r.status)])]}const csv='\ufeff'+rows.map(r=>r.map(csvEscape).join(',')).join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='version_basica_'+activeTab+'.csv';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}
    function init(){loadData();updateHeader();renderSummary();document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));$('refreshBtn').onclick=()=>{loadData();updateHeader();renderActiveTab()};$('exportBtn').onclick=exportCsv;setTab('objetivos')}
    init();
  </script>
</body>
</html>
