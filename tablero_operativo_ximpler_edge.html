<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ximpler EDGE · Tablero Operativo</title>
  <style>
    :root{--bg:#f4f7f9;--card:#fff;--text:#1f2937;--muted:#667085;--line:#e4e7ec;--line2:#d0d5dd;--green:#126b5a;--green2:#22a652;--greenSoft:#e8f7ee;--blue:#0f5ea9;--blueSoft:#eef5ff;--red:#d92d20;--redSoft:#fef3f2;--yellow:#b7791f;--yellowSoft:#fffaeb;--shadow:0 14px 35px rgba(15,23,42,.08);--radius:16px}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}.page{max-width:1480px;margin:0 auto;padding:26px}.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:18px}h1{margin:0;font-size:32px}.subtitle{margin:7px 0 0;color:var(--muted);font-size:14px}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border-radius:11px;font-weight:800;cursor:pointer;font-size:13px;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 14px;border:1px solid transparent;background:#fff;color:var(--text)}.btn-primary{background:var(--green);color:#fff;box-shadow:var(--shadow)}.btn-secondary{border-color:var(--line2)}.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.summary{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:16px}.sum{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:var(--shadow)}.sum-l{font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:900;margin-bottom:6px}.sum-v{font-size:23px;font-weight:900}.sum-n{font-size:12px;color:var(--muted);margin-top:4px}.filters{display:grid;grid-template-columns:1fr 220px 220px 220px;gap:12px;padding:16px;border-bottom:1px solid var(--line)}.input,.select{width:100%;border:1px solid var(--line2);border-radius:11px;padding:11px;background:#fff;color:var(--text);font-size:14px}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:1580px}th,td{padding:12px 10px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:top}th{background:#fbfcfd;color:#667085;text-align:left;font-size:11px;text-transform:uppercase;font-weight:900}tbody tr:hover{background:#fcfdfd}.badge{display:inline-flex;align-items:center;padding:6px 9px;border-radius:999px;font-size:11px;font-weight:900;white-space:nowrap}.b-green{background:var(--greenSoft);color:var(--green2)}.b-red{background:var(--redSoft);color:var(--red)}.b-yellow{background:var(--yellowSoft);color:var(--yellow)}.b-blue{background:var(--blueSoft);color:var(--blue)}.b-gray{background:#f2f4f7;color:#667085}.ring{--val:0;--color:var(--green2);width:54px;height:54px;border-radius:50%;display:grid;place-items:center;position:relative;background:conic-gradient(var(--color) calc(var(--val)*1%),#edf1f5 0);font-weight:900;font-size:12px}.ring:after{content:"";position:absolute;width:40px;height:40px;border-radius:50%;background:#fff}.ring span{position:relative;z-index:1}.group{border:1px solid var(--line2);border-radius:14px;padding:10px 12px;background:#fff;min-width:210px}.group.objective{border-left:4px solid var(--green)}.group.init{border-left:4px solid var(--blue)}.g-k{font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:900}.g-t{font-weight:900;color:var(--green);margin-top:4px}.g-s{font-size:12px;color:var(--muted);margin-top:4px}.muted{color:var(--muted)}.detail{font-size:12px;color:var(--muted);line-height:1.35}.progress{height:9px;width:130px;border-radius:999px;background:#edf1f5;overflow:hidden}.fill{height:100%;border-radius:999px}.mono{font-variant-numeric:tabular-nums}@media(max-width:1000px){.summary,.filters{grid-template-columns:1fr}.topbar{flex-direction:column}.page{padding:16px}}
  </style>
</head>
<body>
  <div class="page"><div class="topbar"><div><h1>Tablero Operativo · Ximpler EDGE</h1><p id="subtitle" class="subtitle">Concentrado de iniciativas, acciones, responsables, fechas, avance, impacto y eficiencia.</p></div><div class="actions"><button id="backBtn" class="btn btn-secondary">← Volver</button><button id="refreshBtn" class="btn btn-primary">Actualizar</button><button id="exportBtn" class="btn btn-secondary">Exportar CSV</button></div></div><div id="summary" class="summary"></div><div class="card"><div class="filters"><input id="search" class="input" placeholder="Buscar objetivo, iniciativa, acción o responsable"><select id="statusFilter" class="select"><option value="all">Todos los estatus</option><option>Pendiente</option><option>En progreso</option><option>Terminada</option><option>Pausada</option><option>Vencida</option></select><select id="priorityFilter" class="select"><option value="all">Todas las prioridades</option><option>Crítica</option><option>Alta</option><option>Media</option><option>Baja</option></select><select id="impactFilter" class="select"><option value="all">Todo impacto</option><option value="low">Bajo impacto</option><option value="efficient">Alta eficiencia</option><option value="overrun">Gasto alto</option></select></div><div class="table-wrap"><table id="opTable"><thead><tr><th>% Obj.</th><th>Objetivo</th><th>% Inic.</th><th>Iniciativa</th><th>Acción / Entregable</th><th>Responsable</th><th>Fecha compromiso</th><th>Estatus</th><th>Prioridad</th><th>Impacto esperado</th><th>Impacto real</th><th>Eficiencia impacto</th><th>Presupuesto</th><th>Gastado</th><th>Riesgo</th></tr></thead><tbody id="body"></tbody></table></div></div></div>
  <script>
    const OBJECTIVES_KEY='ximpler_objetivos_demo_v7_planes', PLANNINGS_KEY='ximpler_planeaciones_demo_v1'; const $=id=>document.getElementById(id); const esc=v=>{const d=document.createElement('div');d.textContent=String(v??'');return d.innerHTML}; const clamp=n=>Math.max(0,Math.min(100,Number(n||0))); const load=k=>{try{return JSON.parse(localStorage.getItem(k)||'[]')}catch(e){return[]}}; const params=new URLSearchParams(location.search); let planningId=params.get('planningId')||localStorage.getItem('ximpler_current_planning_id')||''; let plannings=[],objectives=[];
    function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')} function fmtDate(s){if(!s)return'—';const d=new Date(s+'T00:00:00');return new Intl.DateTimeFormat('es-MX',{day:'2-digit',month:'short',year:'numeric'}).format(d)} function daysText(s){if(!s)return'—';const t=new Date(s+'T00:00:00');t.setHours(0,0,0,0);const n=new Date();n.setHours(0,0,0,0);const diff=Math.round((t-n)/86400000);if(diff>0)return'En '+diff+' día'+(diff!==1?'s':'');if(diff===0)return'Hoy';return'Hace '+Math.abs(diff)+' día'+(diff!==-1?'s':'')} function money(n){n=Number(n||0);return n?new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN'}).format(n):'—'}
    function normAction(a={}){return{title:a.title||a.name||'',responsible:a.responsible||a.owner||'',dueDate:a.dueDate||a.date||'',status:a.status||'Por hacer',detail:a.detail||a.description||''}} function normInit(i={}){return{id:i.id||Math.random(),name:i.name||'',owner:i.owner||'',dueDate:i.dueDate||'',status:i.status||'En progreso',progress:Number(i.progress||0),expectedImpact:Number(i.expectedImpact||0),realImpact:Number(i.realImpact||0),priority:i.priority||'Alta',redundant:i.redundant||'No',competes:i.competes||'No',budget:Number(i.budget||0),spent:Number(i.spent||0),detail:i.detail||'',benefitExpected:i.benefitExpected||'',actions:Array.isArray(i.actions)?i.actions.map(normAction):[]}} function normObj(o={}){const inits=(o.initiatives||o.activities||[]).map(normInit);return{...o,id:o.id||'',planningId:o.planningId||'',name:o.name||'',code:o.code||'',leader:o.leader||'',endDate:o.endDate||'',status:o.status||'activo',initiatives:inits,indicators:Array.isArray(o.indicators)?o.indicators:[],gapRisk:o.gapRisk||'Medio'}}
    function isDone(s){return ['terminada','terminado','cumplido','completado'].includes(String(s||'').toLowerCase())} function isOverdue(d,s){if(!d||isDone(s))return false;return new Date(d+'T00:00:00')<new Date(todayKey()+'T00:00:00')} function actionScore(a){return isDone(a.status)?100:0} function initScore(i){if(!i.actions.length)return isDone(i.status)?100:clamp(i.progress);return Math.round(i.actions.reduce((a,x)=>a+actionScore(x),0)/i.actions.length)} function objScore(o){if(!o.initiatives.length)return 0;return Math.round(o.initiatives.reduce((a,i)=>a+initScore(i),0)/o.initiatives.length)} function impactEff(i){return i.expectedImpact>0?Math.round(clamp(i.realImpact/i.expectedImpact*100)):clamp(i.progress)} function riskFor(i,a){let r=0;if(isOverdue(a?.dueDate||i.dueDate,a?.status||i.status))r+=45;if(i.redundant==='Sí')r+=15;if(i.competes==='Sí')r+=20;if(Number(i.progress)>65&&impactEff(i)<45)r+=20;if(i.budget&&i.spent>i.budget)r+=20;return clamp(r)} function ring(v){v=clamp(v);const c=v>=80?'var(--green2)':v>=50?'var(--yellow)':'var(--red)';return'<div class="ring" style="--val:'+v+';--color:'+c+'"><span>'+v+'%</span></div>'} function badge(t,c){return'<span class="badge b-'+(c||'blue')+'">'+esc(t)+'</span>'} function statusColor(s){s=String(s||'').toLowerCase();if(s.includes('venc'))return'red';if(s.includes('termin'))return'green';if(s.includes('progreso'))return'blue';if(s.includes('paus'))return'yellow';return'gray'} function riskBadge(v){return badge(v>=70?'Alto':v>=40?'Medio':'Bajo',v>=70?'red':v>=40?'yellow':'green')}
    function loadData(){plannings=load(PLANNINGS_KEY);objectives=load(OBJECTIVES_KEY).map(normObj);if(!planningId&&plannings.length)planningId=plannings[0].id;localStorage.setItem('ximpler_current_planning_id',planningId)} function visible(){return objectives.filter(o=>!planningId||o.planningId===planningId)}
    function buildRows(){const rows=[];visible().forEach(o=>{o.initiatives.forEach(i=>{const acts=i.actions.length?i.actions:[{title:'Sin acciones asignadas',responsible:i.owner||o.leader,dueDate:i.dueDate,status:i.status,detail:i.detail||'La iniciativa todavía no tiene acciones tácticas registradas.'}];acts.forEach(a=>{const venc=isOverdue(a.dueDate||i.dueDate,a.status||i.status);rows.push({objective:o,initiative:i,action:a,status:venc?'Vencida':(a.status||i.status),due:a.dueDate||i.dueDate,risk:riskFor(i,a),objAdvance:objScore(o),initAdvance:initScore(i),eff:impactEff(i)})})})});return rows}
    function render(loadAgain=true){
      if(loadAgain) loadData();

      const plan = plannings.find(p=>p.id===planningId) || {};
      const all = buildRows();

      const objCount = visible().length;
      const initCount = visible().reduce((a,o)=>a+o.initiatives.length,0);
      const actCount = all.filter(r=>r.initiative.actions.length).length;
      const overdue = all.filter(r=>r.status==='Vencida').length;
      const op = visible().length ? Math.round(visible().reduce((a,o)=>a+objScore(o),0)/visible().length) : 0;
      const impact = initCount ? Math.round(visible().flatMap(o=>o.initiatives).reduce((a,i)=>a+impactEff(i),0)/initCount) : 0;

      $('subtitle').textContent = (plan.name||'Planeación') + ' · Concentrado operativo con impacto y eficiencia.';
      $('summary').innerHTML = [
        ['Objetivos',objCount,'Mapa operativo'],
        ['Iniciativas',initCount,'Portafolio activo'],
        ['Acciones',actCount,'Tácticas registradas'],
        ['Vencidas',overdue,'Fuera de tiempo'],
        ['% Operativo',op+'%','Ejecución'],
        ['Impacto',impact+'%','Real vs esperado']
      ].map(x=>'<div class="sum"><div class="sum-l">'+x[0]+'</div><div class="sum-v">'+x[1]+'</div><div class="sum-n">'+x[2]+'</div></div>').join('');

      const q = $('search').value.toLowerCase();
      const sf = $('statusFilter').value;
      const pf = $('priorityFilter').value;
      const ifil = $('impactFilter').value;

      const rows = all.filter(r=>{
        const hay = [
          r.objective.name,
          r.objective.code,
          r.initiative.name,
          r.action.title,
          r.action.detail,
          r.action.responsible,
          r.initiative.owner,
          r.status
        ].join(' ').toLowerCase();

        if(q && !hay.includes(q)) return false;
        if(sf !== 'all' && r.status !== sf) return false;
        if(pf !== 'all' && r.initiative.priority !== pf) return false;
        if(ifil === 'low' && !(r.eff < 50)) return false;
        if(ifil === 'efficient' && !(r.eff >= 80)) return false;
        if(ifil === 'overrun' && !(r.initiative.budget && r.initiative.spent > r.initiative.budget)) return false;
        return true;
      });

      // Filas completas para exportar CSV sin perder columnas por los rowspan visuales.
      window.__opExportRows = rows;

      function objectiveKey(row){
        return row.objective.id || row.objective.code || row.objective.name;
      }

      function initiativeKey(row){
        return objectiveKey(row) + '::' + (row.initiative.id || row.initiative.name);
      }

      function countConsecutive(fromIndex, keyFn){
        const key = keyFn(rows[fromIndex]);
        let count = 0;
        for(let i=fromIndex; i<rows.length; i++){
          if(keyFn(rows[i]) !== key) break;
          count++;
        }
        return count;
      }

      const html = rows.map((r,idx)=>{
        const showObjective = idx === 0 || objectiveKey(rows[idx-1]) !== objectiveKey(r);
        const showInitiative = idx === 0 || initiativeKey(rows[idx-1]) !== initiativeKey(r);
        const objSpan = showObjective ? countConsecutive(idx, objectiveKey) : 0;
        const initSpan = showInitiative ? countConsecutive(idx, initiativeKey) : 0;

        return '<tr>'+
          (showObjective ? '<td rowspan="'+objSpan+'">'+ring(r.objAdvance)+'</td>'+
            '<td rowspan="'+objSpan+'"><div class="group objective"><div class="g-k">Objetivo</div><div class="g-t">'+esc(r.objective.code?r.objective.code+' · ':'')+esc(r.objective.name)+'</div><div class="g-s">'+esc(r.objective.leader||'—')+'</div></div></td>' : '')+
          (showInitiative ? '<td rowspan="'+initSpan+'">'+ring(r.initAdvance)+'</td>'+
            '<td rowspan="'+initSpan+'"><div class="group init"><div class="g-k">Iniciativa</div><div class="g-t" style="color:var(--blue)">'+esc(r.initiative.name)+'</div><div class="g-s">Beneficio: '+esc(r.initiative.benefitExpected||'—')+'</div></div></td>' : '')+
          '<td><strong>'+esc(r.action.title)+'</strong><div class="detail">'+esc(r.action.detail||r.initiative.detail||'')+'</div></td>'+
          '<td>'+esc(r.action.responsible||r.initiative.owner||r.objective.leader||'—')+'</td>'+
          '<td><strong>'+daysText(r.due)+'</strong><div class="muted">'+fmtDate(r.due)+'</div></td>'+
          '<td>'+badge(r.status,statusColor(r.status))+'</td>'+
          '<td>'+badge(r.initiative.priority,r.initiative.priority==='Crítica'?'red':r.initiative.priority==='Alta'?'yellow':'blue')+'</td>'+
          '<td class="mono">'+(r.initiative.expectedImpact||0)+'%</td>'+
          '<td class="mono">'+(r.initiative.realImpact||0)+'%</td>'+
          '<td>'+ring(r.eff)+'</td>'+
          '<td>'+money(r.initiative.budget)+'</td>'+
          '<td>'+money(r.initiative.spent)+'</td>'+
          '<td>'+riskBadge(r.risk)+'</td>'+
        '</tr>';
      }).join('');

      $('body').innerHTML = html || '<tr><td colspan="15" class="muted">Sin acciones con los filtros actuales.</td></tr>';
    }
    function exportCsv(){
      const header = [
        '% Obj.', 'Objetivo', '% Inic.', 'Iniciativa', 'Acción / Entregable',
        'Responsable', 'Fecha compromiso', 'Estatus', 'Prioridad',
        'Impacto esperado', 'Impacto real', 'Eficiencia impacto',
        'Presupuesto', 'Gastado', 'Riesgo'
      ];

      const rows = (window.__opExportRows || []).map(r=>[
        r.objAdvance + '%',
        (r.objective.code ? r.objective.code + ' · ' : '') + (r.objective.name || ''),
        r.initAdvance + '%',
        r.initiative.name || '',
        (r.action.title || '') + (r.action.detail ? ' - ' + r.action.detail : ''),
        r.action.responsible || r.initiative.owner || r.objective.leader || '',
        daysText(r.due) + ' · ' + fmtDate(r.due),
        r.status || '',
        r.initiative.priority || '',
        (r.initiative.expectedImpact || 0) + '%',
        (r.initiative.realImpact || 0) + '%',
        r.eff + '%',
        r.initiative.budget || 0,
        r.initiative.spent || 0,
        r.risk >= 70 ? 'Alto' : r.risk >= 40 ? 'Medio' : 'Bajo'
      ]);

      const csv = [header, ...rows]
        .map(row=>row.map(cell=>'"'+String(cell ?? '').replace(/"/g,'""')+'"').join(','))
        .join('\n');

      const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'tablero_operativo_ximpler_edge.csv';
      a.click();
      URL.revokeObjectURL(a.href);
    }
    ['search','statusFilter','priorityFilter','impactFilter'].forEach(id=>$(id).addEventListener('input',()=>render(false)));$('refreshBtn').onclick=()=>render(true);$('exportBtn').onclick=exportCsv;$('backBtn').onclick=()=>history.length>1?history.back():location.href='index_ximpler_edge_copiloto.html';render(true);
  </script>
</body>
</html>
